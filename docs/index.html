<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LITTA - 主动健康服务操作系统</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="LITTA 是以 AI 为底座的主动健康服务操作系统">
  
  <!-- Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* 自定义样式 */
    :root {
      --theme-color: #10b981;
      --theme-color-secondary: #3b82f6;
    }
    
    /* 顶部导航栏 */
    .app-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #eaecef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }
    
    .app-nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .app-nav-logo {
      font-size: 20px;
      font-weight: bold;
      color: var(--theme-color);
      text-decoration: none;
    }
    
    .app-nav-lang {
      padding: 4px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    
    .app-nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .app-nav-link {
      padding: 8px 16px;
      background: var(--theme-color);
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
    }
    
    /* 侧边栏菜单 */
    .sidebar {
      top: 60px !important;
      padding-top: 20px;
    }
    
    .sidebar-nav {
      padding: 0;
    }
    
    .sidebar-nav li {
      list-style: none;
    }
    
    .sidebar-nav a {
      display: block;
      padding: 10px 20px;
      color: #333;
      text-decoration: none;
      border-left: 3px solid transparent;
    }
    
    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      color: var(--theme-color);
      border-left-color: var(--theme-color);
      background: #f5f5f5;
    }
    
    /* 一级菜单 */
    .sidebar-nav > ul > li > a {
      font-weight: bold;
      font-size: 16px;
    }
    
    /* 二级菜单 */
    .sidebar-nav > ul > li > ul > li > a {
      padding-left: 40px;
      font-size: 14px;
    }
    
    /* 主内容区 */
    .content {
      top: 60px !important;
      padding-top: 20px;
    }
    
    /* 首页样式 */
    .home-hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%);
      margin: -20px -20px 40px;
    }
    
    .home-hero h1 {
      font-size: 48px;
      background: linear-gradient(120deg, #10b981 30%, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .home-hero h2 {
      font-size: 24px;
      color: #333;
      margin-bottom: 20px;
    }
    
    .home-hero p {
      font-size: 18px;
      color: #666;
      max-width: 600px;
      margin: 0 auto 30px;
    }
    
    .home-hero .btn {
      display: inline-block;
      padding: 12px 30px;
      background: var(--theme-color);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
    }
    
    .home-features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 40px 20px;
    }
    
    .home-feature {
      text-align: center;
      padding: 30px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .home-feature-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    
    .home-feature h3 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #333;
    }
    
    .home-feature p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="app-nav">
    <div class="app-nav-left">
      <a href="#/" class="app-nav-logo">LITTA</a>
      <select class="app-nav-lang" onchange="changeLang(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="app-nav-right">
      <a href="https://b.litta.cn" target="_blank" class="app-nav-link">商家后台</a>
    </div>
  </nav>

  <div id="app"></div>

  <script>
    // Docsify 配置
    window.$docsify = {
      name: 'LITTA',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'home.md',
      basePath: './',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '找不到结果',
        depth: 6
      }
    };

    // 语言切换
    function changeLang(lang) {
      if (lang === 'en') {
        window.location.href = '#/en/';
      } else {
        window.location.href = '#/';
      }
    }
  </script>

  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LITTA - 主动健康服务操作系统</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="LITTA 是以 AI 为底座的主动健康服务操作系统">
  
  <!-- Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      --theme-color: #1890FF;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      background: #fff;
    }
    
    /* 顶部导航栏 */
    .app-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    
    .app-nav-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    
    .app-nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    
    .app-nav-logo-icon {
      width: 32px;
      height: 32px;
      background: #1890FF;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
    }
    
    .app-nav-logo-text {
      font-size: 18px;
      font-weight: 600;
      color: #111;
    }
    
    .app-nav-lang {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      color: #374151;
    }
    
    .app-nav-lang:hover {
      border-color: #d1d5db;
    }
    
    .app-nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .app-nav-link {
      font-size: 14px;
      color: #6b7280;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .app-nav-link:hover {
      color: #111;
    }
    
    .app-nav-btn {
      padding: 8px 16px;
      background: #1890FF;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .app-nav-btn:hover {
      background: #096dd9;
    }
    
    /* 侧边栏 */
    .sidebar {
      top: 64px !important;
      width: 280px;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 16px 0;
    }
    
    .sidebar-nav {
      padding: 0;
    }
    
    .sidebar-nav ul {
      list-style: none;
    }
    
    .sidebar-nav li {
      margin: 0;
    }
    
    .sidebar-nav > ul > li > a {
      display: block;
      padding: 10px 20px;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }
    
    .sidebar-nav > ul > li > a:hover,
    .sidebar-nav > ul > li > a.active {
      color: #1890FF;
      background: #e6f7ff;
      border-left-color: #1890FF;
    }
    
    .sidebar-nav > ul > li > ul > li > a {
      display: block;
      padding: 8px 20px 8px 36px;
      color: #6b7280;
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }
    
    .sidebar-nav > ul > li > ul > li > a:hover,
    .sidebar-nav > ul > li > ul > li > a.active {
      color: #1890FF;
      background: #e6f7ff;
      border-left-color: #1890FF;
    }
    
    .sidebar-nav > ul > li > ul > li > ul {
      display: none !important;
    }
    
    /* 隐藏 Docsify 默认的搜索和标题 */
    .sidebar-nav > h1,
    .sidebar-nav > .app-name,
    .sidebar > .search {
      display: none !important;
    }
    
    /* 主内容区 */
    .content {
      top: 64px !important;
      left: 280px !important;
      padding: 40px 48px;
      max-width: 900px;
    }
    
    /* Markdown 样式 */
    .markdown-section h1 {
      font-size: 32px;
      font-weight: 600;
      color: #111;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .markdown-section h2 {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin: 40px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f3f4f6;
    }
    
    .markdown-section h3 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin: 28px 0 12px;
    }
    
    .markdown-section p {
      margin: 12px 0;
      color: #4b5563;
      line-height: 1.8;
    }
    
    .markdown-section a {
      color: #1890FF;
      text-decoration: none;
    }
    
    .markdown-section a:hover {
      text-decoration: underline;
    }
    
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    
    .markdown-section th, .markdown-section td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .markdown-section th {
      font-weight: 600;
      color: #111;
      background: #f9fafb;
    }
    
    /* 首页样式 - 简化 */
    .home-content {
      max-width: 800px;
    }
    
    .home-subtitle {
      font-size: 20px;
      font-weight: 400;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    .home-features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid #e5e7eb;
    }
    
    .home-feature {
      padding: 16px 0;
    }
    
    .home-feature-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }
    
    .home-feature h3 {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    
    .home-feature p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <nav class="app-nav">
    <div class="app-nav-left">
      <a href="#/" class="app-nav-logo">
        <div class="app-nav-logo-icon">L</div>
        <span class="app-nav-logo-text">LITTA</span>
      </a>
      <select class="app-nav-lang" onchange="changeLang(this.value)">
        <option value="zh">🌏 简体中文</option>
        <option value="en">English</option>
      </select>
    </div>
    
    <div class="app-nav-right">
      <a href="https://github.com/litta" class="app-nav-link" target="_blank">GitHub</a>
      <a href="https://b.litta.cn" class="app-nav-btn" target="_blank">商家后台</a>
    </div>
  </nav>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 1,
      auto2top: true,
      homepage: 'home.md',
      basePath: './',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      }
    };

    function changeLang(lang) {
      if (lang === 'en') {
        window.location.href = '#/en/';
      } else {
        window.location.href = '#/';
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>

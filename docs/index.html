<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LITTA - 主动健康服务操作系统</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="LITTA 是以 AI 为底座的主动健康服务操作系统">
  
  <!-- Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* 基础样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      background: #fff;
    }
    
    /* 顶部导航栏 - 简约白色 */
    .app-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    
    .app-nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .app-nav-logo {
      font-size: 20px;
      font-weight: 600;
      color: #10b981;
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    
    .app-nav-lang {
      padding: 4px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      color: #666;
    }
    
    .app-nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .app-nav-link {
      padding: 8px 20px;
      background: #10b981;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .app-nav-link:hover {
      background: #059669;
    }
    
    /* 侧边栏 - 简约风格 */
    .sidebar {
      top: 60px !important;
      width: 280px;
      background: #fafafa;
      border-right: 1px solid #e8e8e8;
      padding: 20px 0;
    }
    
    .sidebar-nav {
      padding: 0;
    }
    
    .sidebar-nav ul {
      list-style: none;
    }
    
    .sidebar-nav li {
      margin: 0;
    }
    
    .sidebar-nav a {
      display: block;
      padding: 10px 24px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }
    
    .sidebar-nav a:hover {
      color: #10b981;
      background: #f0fdf4;
    }
    
    .sidebar-nav a.active {
      color: #10b981;
      background: #f0fdf4;
      border-left-color: #10b981;
      font-weight: 500;
    }
    
    /* 一级菜单 */
    .sidebar-nav > ul > li > a {
      font-weight: 600;
      color: #333;
      font-size: 15px;
      padding: 12px 24px;
    }
    
    /* 二级菜单 */
    .sidebar-nav > ul > li > ul {
      padding: 4px 0;
    }
    
    .sidebar-nav > ul > li > ul > li > a {
      padding-left: 40px;
      font-size: 14px;
      color: #666;
    }
    
    /* 主内容区 */
    .content {
      top: 60px !important;
      left: 280px !important;
      padding: 40px 48px;
      max-width: 900px;
    }
    
    /* Markdown 内容样式 */
    .markdown-section h1 {
      font-size: 32px;
      font-weight: 600;
      color: #111;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e8e8e8;
    }
    
    .markdown-section h2 {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin: 40px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .markdown-section h3 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin: 28px 0 12px;
    }
    
    .markdown-section p {
      margin: 12px 0;
      color: #555;
      line-height: 1.8;
    }
    
    .markdown-section a {
      color: #10b981;
      text-decoration: none;
    }
    
    .markdown-section a:hover {
      text-decoration: underline;
    }
    
    .markdown-section code {
      background: #f6f8fa;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "SF Mono", Monaco, Inconsolata, "Fira Code", monospace;
      font-size: 13px;
      color: #333;
    }
    
    .markdown-section pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
    }
    
    .markdown-section pre code {
      background: none;
      padding: 0;
    }
    
    .markdown-section blockquote {
      border-left: 4px solid #10b981;
      padding-left: 16px;
      margin: 16px 0;
      color: #666;
    }
    
    .markdown-section ul, .markdown-section ol {
      margin: 12px 0;
      padding-left: 24px;
    }
    
    .markdown-section li {
      margin: 6px 0;
      color: #555;
    }
    
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    
    .markdown-section th, .markdown-section td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #e8e8e8;
    }
    
    .markdown-section th {
      font-weight: 600;
      color: #333;
      background: #fafafa;
    }
    
    /* 首页特殊样式 */
    .home-title {
      font-size: 48px;
      font-weight: 700;
      color: #111;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }
    
    .home-subtitle {
      font-size: 24px;
      font-weight: 400;
      color: #666;
      margin-bottom: 24px;
    }
    
    .home-tagline {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
      max-width: 600px;
    }
    
    .home-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #10b981;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .home-btn:hover {
      background: #059669;
    }
    
    .home-features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid #e8e8e8;
    }
    
    .home-feature {
      padding: 24px 0;
    }
    
    .home-feature-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    
    .home-feature h3 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    
    .home-feature p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="app-nav">
    <div class="app-nav-left">
      <a href="#/" class="app-nav-logo">LITTA</a>
      <select class="app-nav-lang" onchange="changeLang(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="app-nav-right">
      <a href="https://b.litta.cn" target="_blank" class="app-nav-link">商家后台</a>
    </div>
  </nav>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'LITTA',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'home.md',
      basePath: './',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '找不到结果',
        depth: 6
      }
    };

    function changeLang(lang) {
      if (lang === 'en') {
        window.location.href = '#/en/';
      } else {
        window.location.href = '#/';
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
